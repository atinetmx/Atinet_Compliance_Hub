name: Deploy AWS Production

on:
  push:
    branches:
      - master

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            echo "=== INICIANDO DEPLOY ==="

            sudo -u www-data git -C /var/www/atinet-app pull origin master

            cd /var/www/atinet-app

            echo "=== COMPOSER ==="

            sudo -u www-data composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "=== NPM INSTALL ==="

            sudo -u www-data npm install

            echo "=== BUILD ==="

            sudo -u www-data env NODE_OPTIONS="--max-old-space-size=2048" npm run build

            echo "=== LARAVEL ==="

            sudo -u www-data php artisan optimize

            echo "=== REINICIANDO SERVICIOS ==="

            sudo systemctl restart php8.2-fpm
            sudo systemctl reload nginx

            echo "=== DEPLOY FINALIZADO ==="
